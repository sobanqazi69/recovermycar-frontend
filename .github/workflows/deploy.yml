name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # ── SSH key setup ──────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ── Deploy to recovermycar.uk ──────────────────────────────────────────
      - name: Deploy to recovermycar.uk
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./out/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:/home/recoverycar/htdocs/recoverycar.uk/

      # ── Deploy to cheapcarsrecovery.co.uk ─────────────────────────────────
      - name: Deploy to cheapcarsrecovery.co.uk
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./out/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:/home/cheapcarsrecovery/htdocs/cheapcarsrecovery.co.uk/
